<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Level Producción</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500,600;1,400&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --negro:#0a0908;
    --hueso:#f7f5f2;
    --rojo:#c72a09;
    --verde:#1a8f4c;
    --amarillo:#d9a916;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Montserrat',sans-serif;background:#141312;color:#1c1c1c;min-height:100vh;}
  .topbar{background:var(--negro);color:#fff;padding:18px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;}
  .topbar .brand{display:flex;align-items:center;gap:14px;}
  .topbar .brand img{height:28px;filter:invert(1);}
  .topbar h1{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.4rem;margin:0;letter-spacing:0.03em;}
  .month-nav{display:flex;align-items:center;gap:10px;}
  .month-nav button{background:#232220;color:#fff;border:1px solid #3a3833;border-radius:2px;padding:8px 14px;cursor:pointer;font-size:0.85rem;}
  .month-nav button:hover{background:#333;}
  .month-nav .month-label{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.15rem;min-width:170px;text-align:center;text-transform:capitalize;}

  .toolbar{background:#fff;padding:16px 28px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;border-bottom:1px solid #e4e0d6;}
  .toolbar label{font-size:0.72rem;text-transform:uppercase;letter-spacing:0.06em;color:#666;font-weight:600;margin-right:6px;}
  select{font-family:'Montserrat',sans-serif;font-size:0.85rem;padding:7px 10px;border:1px solid #d8d3c9;border-radius:2px;background:#fff;}
  .btn{background:var(--rojo);color:#fff;border:none;padding:9px 18px;border-radius:2px;cursor:pointer;font-size:0.85rem;font-weight:600;letter-spacing:0.02em;}
  .btn:hover{filter:brightness(1.12);}
  .btn.secondary{background:#333;}
  .btn.ghost{background:none;border:1px solid #d8d3c9;color:#333;}
  .status-msg{font-size:0.8rem;color:#888;}

  .calendar-wrap{padding:20px 28px 60px;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .cal-dow{text-align:center;font-size:0.72rem;text-transform:uppercase;letter-spacing:0.08em;color:#b7b2a9;padding-bottom:8px;font-weight:600;}
  .cal-cell{background:#fff;min-height:170px;border-radius:4px;padding:10px;border:1px solid #eee;}
  .cal-cell.outside{background:#f2f0ec;}
  .cal-cell .daynum{font-size:0.8rem;font-weight:700;color:#333;margin-bottom:6px;}
  .cal-cell.today .daynum{color:var(--rojo);}

  .card{background:#fbfaf7;border:1px solid #e4e0d6;border-left:4px solid #999;border-radius:2px;padding:8px 10px;margin-bottom:8px;font-size:0.85rem;cursor:pointer;}
  .card.etapa-guion{border-left-color:#8a8578;}
  .card.etapa-grabacion{border-left-color:#2b6ea8;}
  .card.etapa-edicion{border-left-color:#c77b1f;}
  .card.etapa-publicacion{border-left-color:#6a3fa0;}
  .card .c-top{font-weight:700;color:#1c1c1c;line-height:1.35;font-size:0.9rem;}
  .card .c-etapa{font-size:0.76rem;text-transform:uppercase;letter-spacing:0.03em;color:#777;margin-top:3px;}
  .card .c-resp{font-size:0.8rem;color:#555;margin-top:3px;display:flex;align-items:center;gap:5px;}
  .resp-dot{display:inline-block;width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .card .c-status{display:inline-block;margin-top:6px;padding:3px 10px;border-radius:10px;font-size:0.76rem;font-weight:700;}
  .card .c-status.pendiente{background:#fdf1cf;color:#8a6d10;}
  .card .c-status.listo{background:#dff2e6;color:var(--verde);}

  /* modal nueva tarjeta */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:50;}
  .modal-bg.open{display:flex;}
  .modal{background:#fff;border-radius:4px;padding:28px 30px;width:420px;max-width:92vw;}
  .modal h2{font-family:'Cormorant Garamond',serif;font-size:1.2rem;margin:0 0 18px;text-transform:uppercase;letter-spacing:0.05em;border-bottom:1px solid var(--rojo);padding-bottom:10px;}
  .modal .field{margin-bottom:14px;}
  .modal label{display:block;font-size:0.7rem;text-transform:uppercase;color:#666;font-weight:600;margin-bottom:5px;}
  .modal input[type=text], .modal input[type=date], .modal select{width:100%;padding:9px 11px;border:1px solid #d8d3c9;border-radius:2px;font-family:'Montserrat',sans-serif;font-size:0.88rem;}
  .modal-actions{display:flex;gap:10px;margin-top:20px;}
  .modal-actions .btn{flex:1;}
  .chips-row{display:flex;gap:8px;flex-wrap:wrap;max-height:110px;overflow-y:auto;padding:2px;}
  .pick-chip{border:1.5px solid #d8d3c9;padding:6px 12px;border-radius:16px;cursor:pointer;font-size:0.8rem;background:#fbfaf7;user-select:none;}
  .pick-chip:hover{border-color:var(--rojo);}
  .pick-chip.selected{background:var(--negro);color:#fff;border-color:var(--negro);}
</style>
</head>

<script>
// Pega aquí la URL de tu Apps Script (la misma que usan Cotizaciones/Recibos/Renta, ya con doGet agregado).
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbx_uZoo8a6Ie_FOxUc9M-3lDQ35qIcmQi4xCoRAt8HwRZkAP1U8EMXJXRFCTeZb96iX/exec';

const ETAPAS = ['Guion','Grabación','Edición','Publicación'];
const ETAPA_CLASS = { 'Guion':'etapa-guion', 'Grabación':'etapa-grabacion', 'Edición':'etapa-edicion', 'Publicación':'etapa-publicacion' };
const DOW = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

let TODAS = [];
let hoy = new Date();
let viewYear = hoy.getFullYear();
let viewMonth = hoy.getMonth();

function uuid(){
  return 'id-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2,8);
}

// Genera un color consistente (siempre el mismo) para cada nombre de responsable, sin configuración manual.
function colorParaResponsable(nombre){
  if(!nombre) return '#999';
  let hash = 0;
  for(let i = 0; i < nombre.length; i++){
    hash = nombre.charCodeAt(i) + ((hash << 5) - hash);
  }
  const hue = Math.abs(hash) % 360;
  return `hsl(${hue}, 62%, 45%)`;
}

async function cargarDatos(){
  const status = document.getElementById('status-msg');
  status.textContent = 'Cargando...';
  try{
    const resp = await fetch(SHEETS_URL);
    const json = await resp.json();
    TODAS = json;
    status.textContent = `Actualizado — ${TODAS.length} tarjeta(s).`;
  } catch(err){
    console.error(err);
    status.textContent = 'No se pudo cargar (revisa la consola / la URL de Apps Script).';
  }
  actualizaFiltros();
  render();
}

function actualizaFiltros(){
  const clientes = [...new Set(TODAS.map(r => r.Cliente).filter(Boolean))].sort();
  const responsables = [...new Set(TODAS.map(r => r.Responsable).filter(Boolean))].sort();

  const selCliente = document.getElementById('f-filtro-cliente');
  const valCliente = selCliente.value;
  selCliente.innerHTML = '<option value="">Todos</option>' + clientes.map(c => `<option value="${c}">${c}</option>`).join('');
  selCliente.value = valCliente;

  const selResp = document.getElementById('f-filtro-responsable');
  const valResp = selResp.value;
  selResp.innerHTML = '<option value="">Todos</option>' + responsables.map(r => `<option value="${r}">${r}</option>`).join('');
  selResp.value = valResp;
}

// Saca la lista de clientes (con su emoji) y responsables ya usados, a partir de las tarjetas existentes —
// no requiere ninguna hoja nueva, solo mira lo que ya hay en "Producción".
function clientesConocidos(){
  const mapa = {};
  TODAS.forEach(r => { if(r.Cliente && !mapa[r.Cliente]) mapa[r.Cliente] = r.Emoji || ''; });
  return Object.entries(mapa).sort((a,b) => a[0].localeCompare(b[0]));
}
function responsablesConocidos(){
  return [...new Set(TODAS.map(r => r.Responsable).filter(Boolean))].sort();
}

function renderChipsModal(){
  const contCli = document.getElementById('chips-clientes');
  contCli.innerHTML = clientesConocidos().map(([nombre, emoji]) =>
    `<div class="pick-chip" data-cliente="${nombre}" data-emoji="${emoji}">${emoji ? emoji + ' ' : ''}${nombre}</div>`
  ).join('') || '<span style="font-size:0.78rem;color:#999;">Aún no hay clientes dados de alta.</span>';

  contCli.querySelectorAll('.pick-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.getElementById('m-cliente').value = chip.dataset.cliente;
      document.getElementById('m-emoji').value = chip.dataset.emoji;
      contCli.querySelectorAll('.pick-chip').forEach(c => c.classList.remove('selected'));
      chip.classList.add('selected');
    });
  });

  const contResp = document.getElementById('chips-responsables');
  contResp.innerHTML = responsablesConocidos().map(nombre =>
    `<div class="pick-chip" data-responsable="${nombre}">${nombre}</div>`
  ).join('') || '<span style="font-size:0.78rem;color:#999;">Aún no hay responsables registrados.</span>';

  contResp.querySelectorAll('.pick-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.getElementById('m-responsable').value = chip.dataset.responsable;
      contResp.querySelectorAll('.pick-chip').forEach(c => c.classList.remove('selected'));
      chip.classList.add('selected');
    });
  });
}

function getFiltradas(){
  const cliente = document.getElementById('f-filtro-cliente').value;
  const responsable = document.getElementById('f-filtro-responsable').value;
  const etapa = document.getElementById('f-filtro-etapa').value;
  return TODAS.filter(r =>
    (!cliente || r.Cliente === cliente) &&
    (!responsable || r.Responsable === responsable) &&
    (!etapa || r.Etapa === etapa)
  );
}

function render(){
  document.getElementById('month-label').textContent = `${MESES[viewMonth]} ${viewYear}`;

  const dowRow = document.getElementById('cal-dow-row');
  dowRow.innerHTML = DOW.map(d => `<div class="cal-dow">${d}</div>`).join('');

  const primerDia = new Date(viewYear, viewMonth, 1);
  const inicioOffset = primerDia.getDay();
  const diasEnMes = new Date(viewYear, viewMonth + 1, 0).getDate();
  const diasMesAnterior = new Date(viewYear, viewMonth, 0).getDate();

  const filtradas = getFiltradas();
  const porFecha = {};
  filtradas.forEach(r => {
    const key = (r.Fecha || '').toString().slice(0,10);
    if(!porFecha[key]) porFecha[key] = [];
    porFecha[key].push(r);
  });

  const totalCeldas = Math.ceil((inicioOffset + diasEnMes) / 7) * 7;
  const grid = document.getElementById('cal-grid');
  let html = '';

  for(let i = 0; i < totalCeldas; i++){
    let dayNum, cellMonth, cellYear, outside = false;
    if(i < inicioOffset){
      dayNum = diasMesAnterior - (inicioOffset - i - 1);
      cellMonth = viewMonth - 1; cellYear = viewYear; outside = true;
    } else if(i >= inicioOffset + diasEnMes){
      dayNum = i - (inicioOffset + diasEnMes) + 1;
      cellMonth = viewMonth + 1; cellYear = viewYear; outside = true;
    } else {
      dayNum = i - inicioOffset + 1;
      cellMonth = viewMonth; cellYear = viewYear;
    }
    const mNorm = ((cellMonth % 12) + 12) % 12;
    const yNorm = cellYear + Math.floor(cellMonth / 12) - (cellMonth < 0 ? 1 : 0);
    const dateKey = `${yNorm}-${String(mNorm+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;
    const isToday = dateKey === hoy.toISOString().slice(0,10);

    const cards = (porFecha[dateKey] || []).map(r => {
      const listo = String(r.Listo).toUpperCase() === 'SI';
      const colorResp = colorParaResponsable(r.Responsable);
      const emoji = r.Emoji ? r.Emoji + ' ' : '';
      let folioLimpio = (r.Folio || '').toString();
      if(/^\d{4}-\d{2}-\d{2}T/.test(folioLimpio)){
        folioLimpio = folioLimpio.slice(0,10); // por si algún dato quedó mal capturado como fecha completa
      }
      return `
        <div class="card ${ETAPA_CLASS[r.Etapa] || ''}" data-id="${r.ID}">
          <div class="c-top">${emoji}${folioLimpio ? folioLimpio + ' — ' : ''}${r.Cliente || ''}</div>
          <div class="c-etapa">${r.Etapa || ''}</div>
          <div class="c-resp"><span class="resp-dot" style="background:${colorResp};"></span>${r.Responsable || ''}</div>
          <span class="c-status ${listo ? 'listo' : 'pendiente'}" data-toggle-listo="${r.ID}" data-listo="${listo ? 'SI' : 'NO'}">${listo ? '✓ Listo' : 'Pendiente'}</span>
        </div>`;
    }).join('');

    html += `<div class="cal-cell ${outside ? 'outside' : ''} ${isToday ? 'today' : ''}" data-date="${dateKey}">
      <div class="daynum">${dayNum}</div>
      ${cards}
    </div>`;
  }
  grid.innerHTML = html;

  grid.querySelectorAll('[data-toggle-listo]').forEach(el => {
    el.addEventListener('click', async (e) => {
      e.stopPropagation();
      const id = el.dataset.toggleListo;
      const actual = el.dataset.listo;
      const nuevo = actual === 'SI' ? 'NO' : 'SI';
      el.textContent = nuevo === 'SI' ? '✓ Listo' : 'Pendiente';
      el.dataset.listo = nuevo;
      el.className = 'c-status ' + (nuevo === 'SI' ? 'listo' : 'pendiente');
      const item = TODAS.find(r => String(r.ID) === String(id));
      if(item) item.Listo = nuevo;
      try{
        await fetch(SHEETS_URL, {
          method:'POST',
          headers:{'Content-Type':'text/plain;charset=utf-8'},
          body: JSON.stringify({ tipo:'produccion_actualizar', id, campo:'listo', valor: nuevo })
        });
      } catch(err){ console.error('No se pudo actualizar', err); }
    });
  });
}

document.getElementById('btn-prev').addEventListener('click', () => {
  viewMonth--; if(viewMonth < 0){ viewMonth = 11; viewYear--; }
  render();
});
document.getElementById('btn-next').addEventListener('click', () => {
  viewMonth++; if(viewMonth > 11){ viewMonth = 0; viewYear++; }
  render();
});
document.getElementById('btn-hoy').addEventListener('click', () => {
  viewYear = hoy.getFullYear(); viewMonth = hoy.getMonth();
  render();
});
document.getElementById('btn-refrescar').addEventListener('click', cargarDatos);
['f-filtro-cliente','f-filtro-responsable','f-filtro-etapa'].forEach(id => {
  document.getElementById(id).addEventListener('change', render);
});

// ============ Modal nueva tarjeta ============
const modalBg = document.getElementById('modal-bg');
document.getElementById('btn-nueva').addEventListener('click', () => {
  document.getElementById('modal-title').textContent = 'Nueva tarjeta';
  document.getElementById('m-id').value = '';
  document.getElementById('m-fecha').value = hoy.toISOString().slice(0,10);
  document.getElementById('m-cliente').value = '';
  document.getElementById('m-emoji').value = '';
  document.getElementById('m-folio').value = '';
  document.getElementById('m-etapa').value = 'Guion';
  document.getElementById('m-responsable').value = '';
  document.getElementById('m-listo').value = 'NO';
  renderChipsModal();
  modalBg.classList.add('open');
});
document.getElementById('m-cliente').addEventListener('input', (e) => {
  const match = clientesConocidos().find(([nombre]) => nombre.toLowerCase() === e.target.value.trim().toLowerCase());
  if(match && match[1]) document.getElementById('m-emoji').value = match[1];
});

document.getElementById('btn-cancelar').addEventListener('click', () => modalBg.classList.remove('open'));
modalBg.addEventListener('click', (e) => { if(e.target === modalBg) modalBg.classList.remove('open'); });

document.getElementById('btn-guardar').addEventListener('click', async () => {
  const btn = document.getElementById('btn-guardar');
  btn.disabled = true;
  const nuevoId = uuid();
  const nueva = {
    ID: nuevoId,
    Fecha: document.getElementById('m-fecha').value,
    Cliente: document.getElementById('m-cliente').value.trim(),
    Emoji: document.getElementById('m-emoji').value.trim(),
    Folio: document.getElementById('m-folio').value.trim(),
    Etapa: document.getElementById('m-etapa').value,
    Responsable: document.getElementById('m-responsable').value.trim(),
    Listo: document.getElementById('m-listo').value
  };
  TODAS.push(nueva);
  modalBg.classList.remove('open');
  actualizaFiltros();
  render();
  try{
    await fetch(SHEETS_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({
        tipo:'produccion_crear',
        id: nueva.ID, fecha: nueva.Fecha, cliente: nueva.Cliente, emoji: nueva.Emoji,
        folio: nueva.Folio, etapa: nueva.Etapa, responsable: nueva.Responsable, listo: nueva.Listo
      })
    });
  } catch(err){ console.error('No se pudo guardar', err); }
  btn.disabled = false;
});

cargarDatos();
</script>
