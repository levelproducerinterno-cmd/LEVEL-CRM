<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Level Producción</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500,600;1,400&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --negro:#0a0908;
    --hueso:#f7f5f2;
    --rojo:#c72a09;
    --verde:#1a8f4c;
    --amarillo:#d9a916;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Montserrat',sans-serif;background:#141312;color:#1c1c1c;min-height:100vh;}
  .topbar{background:var(--negro);color:#fff;padding:18px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;}
  .topbar .brand{display:flex;align-items:center;gap:14px;}
  .topbar .brand img{height:28px;filter:invert(1);}
  .topbar h1{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.4rem;margin:0;letter-spacing:0.03em;}

  .tabs-switch{display:flex;gap:2px;background:var(--negro);padding:0 28px;}
  .tab-btn{background:#1c1a17;color:#b7b2a9;border:none;padding:14px 22px;cursor:pointer;font-size:0.88rem;font-weight:600;letter-spacing:0.02em;border-radius:6px 6px 0 0;}
  .tab-btn.active{background:#f7f5f2;color:var(--negro);}
  .tab-btn:hover:not(.active){background:#2a2723;color:#fff;}

  .modo-panel{display:none;}
  .modo-panel.active{display:block;}

  .month-nav{display:flex;align-items:center;gap:10px;}
  .month-nav button{background:#232220;color:#fff;border:1px solid #3a3833;border-radius:2px;padding:8px 14px;cursor:pointer;font-size:0.85rem;}
  .month-nav button:hover{background:#333;}
  .month-nav .month-label{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.15rem;min-width:170px;text-align:center;text-transform:capitalize;}
  .panel-header{background:var(--negro);color:#fff;padding:16px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;}
  .panel-header .titulo-panel{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.2rem;}

  .toolbar{background:#fff;padding:16px 28px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;border-bottom:1px solid #e4e0d6;}
  .toolbar label{font-size:0.72rem;text-transform:uppercase;letter-spacing:0.06em;color:#666;font-weight:600;margin-right:6px;}
  select{font-family:'Montserrat',sans-serif;font-size:0.85rem;padding:7px 10px;border:1px solid #d8d3c9;border-radius:2px;background:#fff;}
  .btn{background:var(--rojo);color:#fff;border:none;padding:9px 18px;border-radius:2px;cursor:pointer;font-size:0.85rem;font-weight:600;letter-spacing:0.02em;}
  .btn:hover{filter:brightness(1.12);}
  .btn.secondary{background:#333;}
  .btn.ghost{background:none;border:1px solid #d8d3c9;color:#333;}
  .status-msg{font-size:0.8rem;color:#888;}

  .kpi-section{background:#fff;padding:18px 28px 22px;border-bottom:1px solid #e4e0d6;}
  .kpi-section-title{font-size:0.72rem;text-transform:uppercase;letter-spacing:0.06em;color:#888;font-weight:700;margin-bottom:12px;}
  .kpi-wrap{display:flex;gap:22px;flex-wrap:wrap;}
  .kpi-item{min-width:220px;flex:1;max-width:320px;}
  .kpi-header{display:flex;justify-content:space-between;font-size:0.88rem;font-weight:700;margin-bottom:6px;color:#1c1c1c;}
  .kpi-bar-track{background:#eee;border-radius:8px;height:14px;overflow:hidden;}
  .kpi-bar-fill{height:100%;border-radius:8px;transition:width 0.4s ease;}

  .toast-felicidades{
    position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-20px);
    background:var(--verde);color:#fff;padding:16px 26px;border-radius:6px;
    font-weight:700;font-size:0.95rem;box-shadow:0 10px 30px rgba(0,0,0,0.3);
    opacity:0;transition:all 0.35s ease;z-index:100;text-align:center;
  }
  .toast-felicidades.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .calendar-wrap{padding:20px 28px 60px;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .cal-dow{text-align:center;font-size:0.72rem;text-transform:uppercase;letter-spacing:0.08em;color:#b7b2a9;padding-bottom:8px;font-weight:600;}
  .cal-cell{background:#fff;min-height:170px;border-radius:4px;padding:10px;border:1px solid #eee;}
  .cal-cell.outside{background:#f2f0ec;}
  .cal-cell .daynum{font-size:0.8rem;font-weight:700;color:#333;margin-bottom:6px;}
  .cal-cell.today .daynum{color:var(--rojo);}

  .card{background:#fbfaf7;border:1px solid #e4e0d6;border-left:4px solid var(--rojo);border-radius:2px;padding:8px 10px;margin-bottom:8px;font-size:0.85rem;cursor:pointer;}
  .card .c-top{font-weight:700;color:#1c1c1c;line-height:1.35;font-size:0.9rem;}
  .card .c-copy{font-size:0.78rem;color:#666;margin-top:4px;line-height:1.4;max-height:3.6em;overflow:hidden;}
  .card .c-resp{font-size:0.8rem;color:#555;margin-top:3px;display:flex;align-items:center;gap:5px;}
  .resp-dot{display:inline-block;width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .card .c-status{display:inline-block;margin-top:6px;padding:3px 10px;border-radius:10px;font-size:0.76rem;font-weight:700;}
  .card .c-status.pendiente{background:#fdf1cf;color:#8a6d10;}
  .card .c-status.listo{background:#dff2e6;color:var(--verde);}

  /* modal nueva/editar tarjeta */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:flex-start;justify-content:center;z-index:50;overflow-y:auto;padding:40px 16px;}
  .modal-bg.open{display:flex;}
  .modal{background:#fff;border-radius:4px;padding:28px 30px;width:440px;max-width:92vw;margin:0 auto;}
  .modal h2{font-family:'Cormorant Garamond',serif;font-size:1.2rem;margin:0 0 18px;text-transform:uppercase;letter-spacing:0.05em;border-bottom:1px solid var(--rojo);padding-bottom:10px;}
  .modal .field{margin-bottom:14px;}
  .modal label{display:block;font-size:0.7rem;text-transform:uppercase;color:#666;font-weight:600;margin-bottom:5px;}
  .modal input[type=text], .modal input[type=date], .modal select, .modal textarea{width:100%;padding:9px 11px;border:1px solid #d8d3c9;border-radius:2px;font-family:'Montserrat',sans-serif;font-size:0.88rem;}
  .modal textarea{min-height:90px;resize:vertical;}
  .modal-actions{display:flex;gap:10px;margin-top:20px;}
  .modal-actions .btn{flex:1;}
  .chips-row{display:flex;gap:8px;flex-wrap:wrap;max-height:110px;overflow-y:auto;padding:2px;}
  .pick-chip{border:1.5px solid #d8d3c9;padding:6px 12px;border-radius:16px;cursor:pointer;font-size:0.8rem;background:#fbfaf7;user-select:none;}
  .pick-chip:hover{border-color:var(--rojo);}
  .pick-chip.selected{background:var(--negro);color:#fff;border-color:var(--negro);}
</style>
</head>

<script>
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbx_uZoo8a6Ie_FOxUc9M-3lDQ35qIcmQi4xCoRAt8HwRZkAP1U8EMXJXRFCTeZb96iX/exec';

const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DOW = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const hoy = new Date();

const MODOS = {
  edicion: {
    key:'edicion', prefix:'ed', hoja:'Producción',
    tipoCrear:'produccion_crear', tipoActualizar:'produccion_actualizar', tipoActualizarCompleto:'produccion_actualizar_completo',
    tieneCopy:false, tieneResponsable:true, etapaFija:'Edición', kpiPorPersona:true
  },
  cm: {
    key:'cm', prefix:'cm', hoja:'CM',
    tipoCrear:'cm_crear', tipoActualizar:'cm_actualizar', tipoActualizarCompleto:'cm_actualizar_completo',
    tieneCopy:true, tieneResponsable:false, etapaFija:null, kpiPorPersona:false
  }
};

const estado = {
  edicion: { TODAS:[], viewYear:hoy.getFullYear(), viewMonth:hoy.getMonth(), yaFelicitados:new Set() },
  cm:      { TODAS:[], viewYear:hoy.getFullYear(), viewMonth:hoy.getMonth(), yaFelicitados:new Set() }
};

function uuid(){
  return 'id-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2,8);
}

function colorParaResponsable(nombre){
  if(!nombre) return '#999';
  let hash = 0;
  for(let i=0;i<nombre.length;i++){ hash = nombre.charCodeAt(i) + ((hash<<5) - hash); }
  const hue = Math.abs(hash) % 360;
  return `hsl(${hue}, 62%, 45%)`;
}

function inicioSemana(d){
  const dt = new Date(d);
  dt.setHours(0,0,0,0);
  dt.setDate(dt.getDate() - dt.getDay());
  return dt;
}
function finSemana(d){
  const inicio = inicioSemana(d);
  const fin = new Date(inicio);
  fin.setDate(fin.getDate()+6);
  fin.setHours(23,59,59,999);
  return fin;
}

function mostrarFelicitacion(mensaje){
  const toast = document.createElement('div');
  toast.className = 'toast-felicidades';
  toast.textContent = mensaje;
  document.body.appendChild(toast);
  requestAnimationFrame(() => toast.classList.add('show'));
  setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 400); }, 5000);
}

// ============ Cargar datos desde Sheets ============
async function cargarDatos(modoKey){
  const modo = MODOS[modoKey];
  const st = estado[modoKey];
  const statusEl = document.getElementById(modo.prefix + '-status-msg');
  statusEl.textContent = 'Cargando...';
  try{
    const resp = await fetch(SHEETS_URL + '?hoja=' + encodeURIComponent(modo.hoja) + '&t=' + Date.now(), { cache:'no-store' });
    st.TODAS = await resp.json();
    statusEl.textContent = `Actualizado — ${st.TODAS.length} tarjeta(s).`;
  } catch(err){
    console.error(err);
    statusEl.textContent = 'No se pudo cargar (revisa la consola / la URL de Apps Script).';
  }
  actualizaFiltros(modoKey);
  render(modoKey);
}

function actualizaFiltros(modoKey){
  const modo = MODOS[modoKey];
  const st = estado[modoKey];
  const clientes = [...new Set(st.TODAS.map(r => r.Cliente).filter(Boolean))].sort();
  const selCliente = document.getElementById(modo.prefix + '-f-filtro-cliente');
  const valCliente = selCliente.value;
  selCliente.innerHTML = '<option value="">Todos</option>' + clientes.map(c => `<option value="${c}">${c}</option>`).join('');
  selCliente.value = valCliente;

  if(modo.tieneResponsable){
    const responsables = [...new Set(st.TODAS.map(r => r.Responsable).filter(Boolean))].sort();
    const selResp = document.getElementById(modo.prefix + '-f-filtro-responsable');
    const valResp = selResp.value;
    selResp.innerHTML = '<option value="">Todos</option>' + responsables.map(r => `<option value="${r}">${r}</option>`).join('');
    selResp.value = valResp;
  }
}

function clientesConocidos(modoKey){
  const mapa = {};
  estado[modoKey].TODAS.forEach(r => { if(r.Cliente && !mapa[r.Cliente]) mapa[r.Cliente] = r.Emoji || ''; });
  return Object.entries(mapa).sort((a,b) => a[0].localeCompare(b[0]));
}
function responsablesConocidos(modoKey){
  return [...new Set(estado[modoKey].TODAS.map(r => r.Responsable).filter(Boolean))].sort();
}

function getFiltradas(modoKey){
  const modo = MODOS[modoKey];
  const st = estado[modoKey];
  const cliente = document.getElementById(modo.prefix + '-f-filtro-cliente').value;
  let responsable = '';
  if(modo.tieneResponsable){
    responsable = document.getElementById(modo.prefix + '-f-filtro-responsable').value;
  }
  return st.TODAS.filter(r => (!cliente || r.Cliente === cliente) && (!responsable || r.Responsable === responsable));
}

// ============ Render calendario ============
function render(modoKey){
  const modo = MODOS[modoKey];
  const st = estado[modoKey];
  const p = modo.prefix;

  document.getElementById(p + '-month-label').textContent = `${MESES[st.viewMonth]} ${st.viewYear}`;

  const dowRow = document.getElementById(p + '-cal-dow-row');
  dowRow.innerHTML = DOW.map(d => `<div class="cal-dow">${d}</div>`).join('');

  const primerDia = new Date(st.viewYear, st.viewMonth, 1);
  const inicioOffset = primerDia.getDay();
  const diasEnMes = new Date(st.viewYear, st.viewMonth + 1, 0).getDate();
  const diasMesAnterior = new Date(st.viewYear, st.viewMonth, 0).getDate();

  const filtradas = getFiltradas(modoKey);
  const porFecha = {};
  filtradas.forEach(r => {
    const key = (r.Fecha || '').toString().slice(0,10);
    if(!porFecha[key]) porFecha[key] = [];
    porFecha[key].push(r);
  });

  const totalCeldas = Math.ceil((inicioOffset + diasEnMes) / 7) * 7;
  const grid = document.getElementById(p + '-cal-grid');
  let html = '';

  for(let i = 0; i < totalCeldas; i++){
    let dayNum, cellMonth, cellYear, outside = false;
    if(i < inicioOffset){
      dayNum = diasMesAnterior - (inicioOffset - i - 1);
      cellMonth = st.viewMonth - 1; cellYear = st.viewYear; outside = true;
    } else if(i >= inicioOffset + diasEnMes){
      dayNum = i - (inicioOffset + diasEnMes) + 1;
      cellMonth = st.viewMonth + 1; cellYear = st.viewYear; outside = true;
    } else {
      dayNum = i - inicioOffset + 1;
      cellMonth = st.viewMonth; cellYear = st.viewYear;
    }
    const mNorm = ((cellMonth % 12) + 12) % 12;
    const yNorm = cellYear + Math.floor(cellMonth / 12) - (cellMonth < 0 ? 1 : 0);
    const dateKey = `${yNorm}-${String(mNorm+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;
    const isToday = dateKey === hoy.toISOString().slice(0,10);

    const cards = (porFecha[dateKey] || []).map(r => {
      const listo = String(r.Listo).toUpperCase() === 'SI';
      const emoji = r.Emoji ? r.Emoji + ' ' : '';
      let folioLimpio = (r.Folio || '').toString();
      if(/^\d{4}-\d{2}-\d{2}T/.test(folioLimpio)){ folioLimpio = folioLimpio.slice(0,10); }

      let respHtml = '';
      if(modo.tieneResponsable){
        const colorResp = colorParaResponsable(r.Responsable);
        respHtml = `<div class="c-resp"><span class="resp-dot" style="background:${colorResp};"></span>${r.Responsable || ''}</div>`;
      }
      let copyHtml = '';
      if(modo.tieneCopy && r.Copy){
        const copyTxt = r.Copy.toString();
        copyHtml = `<div class="c-copy">${copyTxt.slice(0,90)}${copyTxt.length > 90 ? '…' : ''}</div>`;
      }

      return `
        <div class="card" data-id="${r.ID}" data-modo="${modoKey}">
          <div class="c-top">${emoji}${folioLimpio ? folioLimpio + ' — ' : ''}${r.Cliente || ''}</div>
          ${copyHtml}
          ${respHtml}
          <span class="c-status ${listo ? 'listo' : 'pendiente'}" data-toggle-listo="${r.ID}" data-toggle-modo="${modoKey}" data-listo="${listo ? 'SI' : 'NO'}">${listo ? '✓ Listo' : 'Pendiente'}</span>
        </div>`;
    }).join('');

    html += `<div class="cal-cell ${outside ? 'outside' : ''} ${isToday ? 'today' : ''}" data-date="${dateKey}">
      <div class="daynum">${dayNum}</div>
      ${cards}
    </div>`;
  }
  grid.innerHTML = html;

  grid.querySelectorAll('[data-toggle-listo]').forEach(el => {
    el.addEventListener('click', async (e) => {
      e.stopPropagation();
      const id = el.dataset.toggleListo;
      const mk = el.dataset.toggleModo;
      const actual = el.dataset.listo;
      const nuevo = actual === 'SI' ? 'NO' : 'SI';
      el.textContent = nuevo === 'SI' ? '✓ Listo' : 'Pendiente';
      el.dataset.listo = nuevo;
      el.className = 'c-status ' + (nuevo === 'SI' ? 'listo' : 'pendiente');
      const item = estado[mk].TODAS.find(r => String(r.ID) === String(id));
      if(item) item.Listo = nuevo;
      renderKPIs(mk);
      try{
        await fetch(SHEETS_URL, {
          method:'POST',
          headers:{'Content-Type':'text/plain;charset=utf-8'},
          body: JSON.stringify({ tipo: MODOS[mk].tipoActualizar, id, campo:'listo', valor: nuevo })
        });
      } catch(err){ console.error('No se pudo actualizar', err); }
    });
  });

  grid.querySelectorAll('.card').forEach(cardEl => {
    cardEl.addEventListener('click', () => abrirModalEdicion(cardEl.dataset.modo, cardEl.dataset.id));
  });

  renderKPIs(modoKey);
}

// ============ KPIs semanales ============
function renderKPIs(modoKey){
  const modo = MODOS[modoKey];
  const st = estado[modoKey];
  const cont = document.getElementById(modo.prefix + '-kpi-wrap');
  const ahora = new Date();
  const ini = inicioSemana(ahora);
  const fin = finSemana(ahora);
  const semanaKey = ini.toISOString().slice(0,10);

  const enSemana = st.TODAS.filter(r => {
    const fRaw = (r.Fecha || '').toString().slice(0,10);
    if(!fRaw) return false;
    const f = new Date(fRaw + 'T12:00:00');
    return f >= ini && f <= fin;
  });

  if(modo.kpiPorPersona){
    const porResp = {};
    enSemana.forEach(r => {
      const nombre = r.Responsable || 'Sin asignar';
      if(!porResp[nombre]) porResp[nombre] = { total:0, listos:0 };
      porResp[nombre].total++;
      if(String(r.Listo).toUpperCase() === 'SI') porResp[nombre].listos++;
    });
    const nombres = Object.keys(porResp).sort();
    if(nombres.length === 0){
      cont.innerHTML = '<div style="color:#999;font-size:0.85rem;">No hay videos de Edición programados para esta semana.</div>';
      return;
    }
    cont.innerHTML = nombres.map(nombre => {
      const { total, listos } = porResp[nombre];
      const pct = total ? Math.round((listos/total)*100) : 0;
      const color = colorParaResponsable(nombre);
      return `
        <div class="kpi-item">
          <div class="kpi-header"><span>${nombre}</span><span>${listos}/${total}</span></div>
          <div class="kpi-bar-track"><div class="kpi-bar-fill" style="width:${pct}%;background:${color};"></div></div>
        </div>`;
    }).join('');

    nombres.forEach(nombre => {
      const { total, listos } = porResp[nombre];
      const clave = modoKey + '-' + nombre + '-' + semanaKey;
      if(total > 0 && listos >= total && !st.yaFelicitados.has(clave)){
        st.yaFelicitados.add(clave);
        mostrarFelicitacion(`🎉 ¡Felicidades ${nombre}! Completaste tu objetivo de la semana.`);
      }
    });
  } else {
    const total = enSemana.length;
    const listos = enSemana.filter(r => String(r.Listo).toUpperCase() === 'SI').length;
    if(total === 0){
      cont.innerHTML = '<div style="color:#999;font-size:0.85rem;">No hay videos programados para publicar esta semana.</div>';
      return;
    }
    const pct = Math.round((listos/total)*100);
    cont.innerHTML = `
      <div class="kpi-item" style="max-width:100%;">
        <div class="kpi-header"><span>Publicaciones de la semana</span><span>${listos}/${total}</span></div>
        <div class="kpi-bar-track"><div class="kpi-bar-fill" style="width:${pct}%;background:var(--rojo);"></div></div>
      </div>`;

    const clave = modoKey + '-general-' + semanaKey;
    if(total > 0 && listos >= total && !st.yaFelicitados.has(clave)){
      st.yaFelicitados.add(clave);
      mostrarFelicitacion('🎉 ¡Felicidades equipo! Completaron todas las publicaciones de la semana.');
    }
  }
}

// ============ Modal compartido ============
function renderChipsModal(modoKey){
  const contCli = document.getElementById('chips-clientes');
  contCli.innerHTML = clientesConocidos(modoKey).map(([nombre, emoji]) =>
    `<div class="pick-chip" data-cliente="${nombre}" data-emoji="${emoji}">${emoji ? emoji + ' ' : ''}${nombre}</div>`
  ).join('') || '<span style="font-size:0.78rem;color:#999;">Aún no hay clientes dados de alta.</span>';

  contCli.querySelectorAll('.pick-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.getElementById('m-cliente').value = chip.dataset.cliente;
      document.getElementById('m-emoji').value = chip.dataset.emoji;
      contCli.querySelectorAll('.pick-chip').forEach(c => c.classList.remove('selected'));
      chip.classList.add('selected');
    });
  });

  const modo = MODOS[modoKey];
  const campoResp = document.getElementById('campo-responsable');
  if(modo.tieneResponsable){
    campoResp.style.display = 'block';
    const contResp = document.getElementById('chips-responsables');
    contResp.innerHTML = responsablesConocidos(modoKey).map(nombre =>
      `<div class="pick-chip" data-responsable="${nombre}">${nombre}</div>`
    ).join('') || '<span style="font-size:0.78rem;color:#999;">Aún no hay responsables registrados.</span>';
    contResp.querySelectorAll('.pick-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        document.getElementById('m-responsable').value = chip.dataset.responsable;
        contResp.querySelectorAll('.pick-chip').forEach(c => c.classList.remove('selected'));
        chip.classList.add('selected');
      });
    });
  } else {
    campoResp.style.display = 'none';
  }

  document.getElementById('campo-copy').style.display = modo.tieneCopy ? 'block' : 'none';
}

function abrirModalNueva(modoKey){
  document.getElementById('modal-title').textContent = 'Nueva tarjeta';
  document.getElementById('m-id').value = '';
  document.getElementById('m-modo').value = modoKey;
  document.getElementById('m-fecha').value = hoy.toISOString().slice(0,10);
  document.getElementById('m-cliente').value = '';
  document.getElementById('m-emoji').value = '';
  document.getElementById('m-folio').value = '';
  document.getElementById('m-copy').value = '';
  document.getElementById('m-responsable').value = '';
  document.getElementById('m-listo').value = 'NO';
  renderChipsModal(modoKey);
  modalBg.classList.add('open');
}

function abrirModalEdicion(modoKey, id){
  const item = estado[modoKey].TODAS.find(r => String(r.ID) === String(id));
  if(!item) return;
  document.getElementById('modal-title').textContent = 'Editar tarjeta';
  document.getElementById('m-id').value = item.ID;
  document.getElementById('m-modo').value = modoKey;
  document.getElementById('m-fecha').value = (item.Fecha || '').toString().slice(0,10);
  document.getElementById('m-cliente').value = item.Cliente || '';
  document.getElementById('m-emoji').value = item.Emoji || '';
  document.getElementById('m-folio').value = item.Folio || '';
  document.getElementById('m-copy').value = item.Copy || '';
  document.getElementById('m-responsable').value = item.Responsable || '';
  document.getElementById('m-listo').value = String(item.Listo).toUpperCase() === 'SI' ? 'SI' : 'NO';
  renderChipsModal(modoKey);
  modalBg.classList.add('open');
}

document.getElementById('m-cliente').addEventListener('input', (e) => {
  const modoKey = document.getElementById('m-modo').value;
  const match = clientesConocidos(modoKey).find(([nombre]) => nombre.toLowerCase() === e.target.value.trim().toLowerCase());
  if(match && match[1]) document.getElementById('m-emoji').value = match[1];
});

const modalBg = document.getElementById('modal-bg');
document.getElementById('btn-cancelar').addEventListener('click', () => modalBg.classList.remove('open'));
modalBg.addEventListener('click', (e) => { if(e.target === modalBg) modalBg.classList.remove('open'); });

document.getElementById('btn-guardar').addEventListener('click', async () => {
  const btn = document.getElementById('btn-guardar');
  btn.disabled = true;
  const modoKey = document.getElementById('m-modo').value;
  const modo = MODOS[modoKey];
  const idExistente = document.getElementById('m-id').value;

  const datosForm = {
    Fecha: document.getElementById('m-fecha').value,
    Cliente: document.getElementById('m-cliente').value.trim(),
    Emoji: document.getElementById('m-emoji').value.trim(),
    Folio: document.getElementById('m-folio').value.trim(),
    Listo: document.getElementById('m-listo').value
  };
  if(modo.tieneCopy) datosForm.Copy = document.getElementById('m-copy').value.trim();
  if(modo.tieneResponsable) datosForm.Responsable = document.getElementById('m-responsable').value.trim();
  if(modo.etapaFija) datosForm.Etapa = modo.etapaFija;

  const st = estado[modoKey];

  if(idExistente){
    const item = st.TODAS.find(r => String(r.ID) === String(idExistente));
    if(item) Object.assign(item, datosForm);
    modalBg.classList.remove('open');
    actualizaFiltros(modoKey);
    render(modoKey);
    const payload = {
      tipo: modo.tipoActualizarCompleto, id: idExistente,
      fecha: datosForm.Fecha, cliente: datosForm.Cliente, emoji: datosForm.Emoji,
      folio: datosForm.Folio, listo: datosForm.Listo
    };
    if(modo.tieneCopy) payload.copy = datosForm.Copy;
    if(modo.tieneResponsable) payload.responsable = datosForm.Responsable;
    if(modo.etapaFija) payload.etapa = datosForm.Etapa;
    try{
      await fetch(SHEETS_URL, { method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body: JSON.stringify(payload) });
    } catch(err){ console.error('No se pudo actualizar', err); }
  } else {
    const nueva = { ID: uuid(), ...datosForm };
    st.TODAS.push(nueva);
    modalBg.classList.remove('open');
    actualizaFiltros(modoKey);
    render(modoKey);
    const payload = {
      tipo: modo.tipoCrear, id: nueva.ID,
      fecha: nueva.Fecha, cliente: nueva.Cliente, emoji: nueva.Emoji,
      folio: nueva.Folio, listo: nueva.Listo
    };
    if(modo.tieneCopy) payload.copy = nueva.Copy;
    if(modo.tieneResponsable) payload.responsable = nueva.Responsable;
    if(modo.etapaFija) payload.etapa = nueva.Etapa;
    try{
      await fetch(SHEETS_URL, { method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body: JSON.stringify(payload) });
    } catch(err){ console.error('No se pudo guardar', err); }
  }
  btn.disabled = false;
});

// ============ Cambio de pestañas ============
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const modo = btn.dataset.modo;
    document.querySelectorAll('.modo-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + modo).classList.add('active');
  });
});

// ============ Navegación de mes / refrescar / nueva tarjeta (delegado por data-accion) ============
document.querySelectorAll('[data-accion]').forEach(btn => {
  btn.addEventListener('click', () => {
    const accion = btn.dataset.accion;
    const modoKey = btn.dataset.modo;
    const st = estado[modoKey];
    if(accion === 'prev'){ st.viewMonth--; if(st.viewMonth < 0){ st.viewMonth = 11; st.viewYear--; } render(modoKey); }
    else if(accion === 'next'){ st.viewMonth++; if(st.viewMonth > 11){ st.viewMonth = 0; st.viewYear++; } render(modoKey); }
    else if(accion === 'hoy'){ st.viewYear = hoy.getFullYear(); st.viewMonth = hoy.getMonth(); render(modoKey); }
    else if(accion === 'refrescar'){ cargarDatos(modoKey); }
    else if(accion === 'nueva'){ abrirModalNueva(modoKey); }
  });
});

document.getElementById('ed-f-filtro-cliente').addEventListener('change', () => render('edicion'));
document.getElementById('ed-f-filtro-responsable').addEventListener('change', () => render('edicion'));
document.getElementById('cm-f-filtro-cliente').addEventListener('change', () => render('cm'));

cargarDatos('edicion');
cargarDatos('cm');
</script>
